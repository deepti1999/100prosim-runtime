id: E-verbrauch-auto-cascade
summary: >
  Verifies Phase 4-E. User edits a Verbrauch target value; linked Erneuerbare cells must
  recompute automatically (no "Recalculate Renewables" button press required). This checks
  the Excel-style cascade propagation called for in PDF §2.4.4 — NOT auto-Balance.
status: stub
depends_on: Phase 4-E implemented
mutations:
  - path: /verbrauch/
    edit: { code: '1.1.2', target: 95 }     # change from seeded baseline
reset: reset-testsim
probes:
  - path: /verbrauch/
    capture: [title, verbrauch_codes, row_1_1_2_target, row_1_1_2_ziel]
  - path: /renewable/
    capture: [row_9_1_2_target, row_9_1_2_ziel]  # must reflect cascade
  - path: /cockpit/
    capture: [balance_status]
invariants:
  - name: no_balance_job_fired
    check: BalanceJob table count unchanged by this scenario (cascade is NOT Balance)
  - name: cascade_completed
    check: Erneuerbare row linked to 1.1.2 reflects new value without clicking Recalculate
