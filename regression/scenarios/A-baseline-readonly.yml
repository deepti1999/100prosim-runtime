id: A-baseline-readonly
summary: Login + visit every main page + capture title & top-line numbers. No DB mutations.
mutations: none
reset: none
probes:
  - path: /simulation/
    capture: [title]
  - path: /landuse/
    capture: [title, landuse_codes, landuse_target_ha]
  - path: /renewable/
    capture: [title, renewable_codes]
  - path: /verbrauch/
    capture: [title, verbrauch_codes]
  - path: /annual-electricity/
    capture: [title, header_scenario_label, key_rows_9x_10x]
  - path: /bilanz/
    capture: [title, section_headers]
  - path: /cockpit/
    capture: [title]
  - path: /ws/
    capture: [title, day1_ladezust, day365_ladezust]
