id: D-full-flow-verbrauch-solar-wind
summary: >
  Thesis-verified end-to-end: 2 Verbrauch edits → 2 Save & Continue recalcs →
  Recalculate Renewables → either (solar variant) or (wind variant) of the two
  balance buttons. Both variants converge to the same annual electricity total
  (1,108,834.53 GWh) via different land-use knobs. Captured against Pascal's
  live Chrome session on 2026-04-20.

baseline_fingerprint:
  seed_file: seed/sqlite_seed.json
  seed_row_count: 3995
  baseline_LU_2_1_target_ha: 684640.80
  baseline_LU_6_target_ha: 715288.67
  baseline_verbrauch_1_1_2_user_percent: 95.0
  baseline_verbrauch_2_4_1_user_percent: 80.0
  baseline_verbrauch_7_ziel: 1005742.85
  baseline_verbrauch_8_ziel: 1863864.84
  baseline_annual_electricity_gwh: 1107646
  note: >
    All "after" values in this scenario are valid ONLY against this baseline.
    If any baseline_* fact above drifts, the scenario "after" values must be
    re-captured before re-use. compare.py should check fingerprints before
    comparing goldens.

inputs:
  - page: /verbrauch/
    code: "1.1.2"
    name: Zieleinfluss Endanwendungs-Effizienz
    from: 95
    to: 100
    commit_step: save_and_continue_round_1
  - page: /verbrauch/
    code: "2.4.1"
    name: Spez.Raumwärmebed. Status/Saniert
    from: 80
    to: 75
    commit_step: save_and_continue_round_2

flow:
  - name: edit_1_1_2
    action: ui_edit
    page: /verbrauch/
    code: "1.1.2"
    new_value: 100
  - name: save_and_continue_round_1
    action: ui_click
    page: /verbrauch/
    button: "Save All Values"
    backend_job: verbrauch_recalc
    expected_duration_s: 8.3
    probes_after:
      - { page: /verbrauch/, code: "7", field: ziel, drift_detect: true }
      - { page: /verbrauch/, code: "8", field: ziel, drift_detect: true }

  - name: edit_2_4_1
    action: ui_edit
    page: /verbrauch/
    code: "2.4.1"
    new_value: 75
  - name: save_and_continue_round_2
    action: ui_click
    page: /verbrauch/
    button: "Save All Values"
    backend_job: verbrauch_recalc
    expected_duration_s: 6.2
    probes_after:
      - page: /verbrauch/
        code: "7"
        field: ziel
        expected: "1,006,821.8"
        hard_assert: true
      - page: /verbrauch/
        code: "8"
        field: ziel
        expected: "1,858,597.3"
        hard_assert: true

  - name: recalculate_renewables
    action: ui_click
    page: /renewable/
    button: "Recalculate Renewables"
    backend_job: renewables_recalc
    expected_duration_s: 8.2
    expected_rows_updated: 30

variants:
  solar:
    branch_from: recalculate_renewables
    flow:
      - name: ws_balance_solar
        action: ui_click
        page: /ws/
        button_id: applyBalanceBtn
        backend_job: solar_ws_only
        expected_duration_s: 10
        probes_after:
          - { code: LU_2.1, field: target_ha,  expected: 680825.67, tolerance: 1.0, hard_assert: true }
          - { field: speicherdrift_gwh, max_abs: 0.1, hard_assert: true }
      - name: sector_ws_solar_balance
        action: ui_click
        page: /ws/
        button_id: applyFullBalanceBtn
        backend_job: solar_sector_ws
        expected_duration_s: 68
        probes_after:
          - { code: LU_2.1, field: target_ha, expected: 680478.26, tolerance: 1.0, hard_assert: true }
          - { field: speicherdrift_gwh, max_abs: 0.1, hard_assert: true }
          - page: /annual-electricity/
            field: annual_electricity_gwh
            expected: 1108834.53
            tolerance: 0.5
            hard_assert: true
          - { field: prozesswaerme_gap_gwh,      max_abs: 50, note: "within-tolerance" }
          - { field: gebaeudewaerme_gap_gwh,     max_abs: 50, note: "within-tolerance" }
          - { field: mobile_anwendungen_gap_gwh, max_abs: 50, note: "within-tolerance" }

  wind:
    branch_from: recalculate_renewables
    flow:
      - name: ws_balance_wind
        action: ui_click
        page: /ws/
        button_id: applyWindBalanceBtn
        backend_job: wind_ws_only
        expected_duration_s: 10
        probes_after:
          - { code: LU_6, field: target_ha, expected: 715288.57, tolerance: 1.0, hard_assert: true }
          - { field: speicherdrift_gwh, max_abs: 0.1, hard_assert: true }
      - name: sector_ws_wind_balance
        action: ui_click
        page: /ws/
        button_id: applyWindFullBalanceBtn
        backend_job: wind_sector_ws
        expected_duration_s: 45
        probes_after:
          - { code: LU_6, field: target_ha, expected: 715288.57, tolerance: 1.0, hard_assert: true }
          - { field: speicherdrift_gwh, max_abs: 0.1, hard_assert: true }
          - page: /annual-electricity/
            field: annual_electricity_gwh
            expected: 1108834.53
            tolerance: 0.5
            hard_assert: true

cross_variant_invariants:
  - description: "Both variants converge to the same annual electricity endpoint regardless of which land-use knob moves."
    assert: "solar.annual_electricity_gwh ≈ wind.annual_electricity_gwh (± 0.5 GWh)"
  - description: "Both variants bring storage drift to ≈ 0."
    assert: "both speicherdrift_gwh <= 0.1 GWh abs"

reset:
  localstorage_keys_to_clear: [verbrauch_changes_history, landuse_changes_history]
  db_reset: not_required   # balance jobs do not persist to DB; seed baseline is restored naturally

notes: |
  The app stores user inputs in browser localStorage, NOT in the DB. DB state
  reflects the seed baseline throughout; the recalc outputs are transient in
  the running Python process and rendered to the page. This means:
    - Replaying the scenario requires seeding localStorage before navigation
      (the Django test class does this via page.add_init_script).
    - The "before" Verbrauch 7/8 ziel values match the seed.
    - The "after" values are read from the page DOM after the recalc runs.
  Scenario was captured from Pascal's live Chrome session on 2026-04-20.
  Wind variant was reproduced by Claude via MCP in the same session to pin
  the exact post-wind-balance values against the same verbrauch inputs.
