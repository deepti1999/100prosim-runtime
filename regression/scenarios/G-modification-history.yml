id: G-modification-history
summary: >
  Verifies Phase 6-A. Perform a sequence of 3 edits (Verbrauch, LandUse, Renewable);
  the modification history page must log each step with before/after values and
  display them as columns per the Excel AH.Monitor layout (PDF §2.5.8).
status: stub
depends_on: Phase 6-A implemented (ModificationHistoryEntry model)
mutations:
  - path: /verbrauch/
    edit: { code: '1.1.2', target: 95 }
  - path: /landuse/
    edit: { code: 'LU_2.1', user_percent: 3.5 }
  - path: /renewable/
    edit: { code: '9.1.2', user_value: 180000 }
reset: reset-testsim
probes:
  - path: /historie/   # new page added in 6-A
    capture: [title, history_row_count, row_0_field, row_0_before, row_0_after,
              row_1_field, row_1_before, row_1_after,
              row_2_field, row_2_before, row_2_after]
invariants:
  - name: all_edits_logged
    check: history_row_count == 3
  - name: order_preserved
    check: row_2 is the latest edit (Renewable 9.1.2)
  - name: no_delete_button_present
    check: history is inspectable, not undoable (PDF says "Nachverfolgung", not "Rückgängig")
